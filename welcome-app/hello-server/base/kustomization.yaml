apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

nameSuffix: -hello-server

labels:
  - pairs:
      app: welcome-app
      service: hello-server
    includeSelectors: true
    includeTemplates: true

resources:
  - deployment.yaml
  - ingress.yaml

replicas:
  - name: welcome-app
    count: 1
